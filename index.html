<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dixit Board</title>

    <link rel="icon" href="icon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fde27f">
    <link rel="apple-touch-startup-image" href="screenshot_1.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="dixit-rules.webp">
    <link rel="preload" as="image" href="dixit-board.webp">
</head>
<body>


<div style="margin: auto; height: 100dvh;">
    <div class="canvas-wrapper" style="height: calc(100% - 65px);background-image: url('dixit-board.webp');">
        <canvas id="dixit-board-canvas"></canvas>

        <div class="rules-block" style="display: none; background-image: url('dixit-rules.webp');"></div>
    </div>

    <div class="buttons-block" style="height: 65px;">
        <button class="rules-btn">Rules</button>
        <button class="reset-btn"><span>🔄</span> Reset</button>
        <button class="back-btn" style="display:none">⬅️ Back</button>
    </div>
</div>

<script src="canvas-dnd-logic.js"></script>
<script src="ui-logic.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js?v=1.8');
    }
</script>
</body>
</html>
